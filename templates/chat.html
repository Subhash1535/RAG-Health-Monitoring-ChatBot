<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ conv_title }} - SymptoSense AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #0d9488; --primary-dark: #0f766e; }
        body { background: #f0fdfa; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; background: url('https://thumbs.dreamstime.com/b/abstract-medical-background-healthcare-technology-concept-blue-tone-color-illustration-271399111') center/cover no-repeat; background-attachment: fixed; opacity: 0.9; }
        .message { max-width: 80%; padding: 14px 20px; border-radius: 20px; margin-bottom: 20px; word-wrap: break-word; line-height: 1.7; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-message { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 5px; margin-left: auto; }
        .bot-message { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 5px; margin-right: auto; }
        .chat-messages { display: flex; flex-direction: column; }
        .input-area { background: white; border-top: 1px solid #eee; padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .form-control { border-radius: 30px; padding-right: 60px; }
        .send-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--primary); width: 48px; height: 48px; border-radius: 50%; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <a href="/conversations" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="bi bi-arrow-left me-2"></i>Back
            </a>
            <h5 class="mb-0 fw-bold text-primary">{{ conv_title }}</h5>
            <div>
                <span class="text-muted me-3">Hello, {{ username }}</span>
                <a href="/logout" class="btn btn-outline-danger rounded-pill">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid chat-container">
        <div class="chat-messages">
            {% for chat in chats %}
                <div class="message user-message">{{ chat.message | replace('\n', '<br>') | safe }}</div>
                <div class="message bot-message">
                    {{ chat.response | replace('\n', '<br>') | safe }}
                </div>
            {% endfor %}
        </div>
    </div>

    <div class="input-area">
        <div class="container">
            <form method="POST" class="position-relative">
                <input type="text" name="question" class="form-control form-control-lg shadow-sm" 
                       placeholder="Ask about your report or symptoms..." required autocomplete="off">
                <button type="submit" class="btn send-btn text-white shadow">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const container = document.querySelector('.chat-container');
        container.scrollTop = container.scrollHeight;
    </script>
</body>
</html>
