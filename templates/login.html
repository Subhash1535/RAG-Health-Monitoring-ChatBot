<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SymptoTrack AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #0d9488; --primary-dark: #0f766e; }
        body { background: linear-gradient(135deg, #e0fffa, #f0fdfa); min-height: 100vh; display: flex; align-items: center; }
        .auth-card {
            background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(13,148,136,0.2);
            overflow: hidden; max-width: 420px;
        }
        .auth-header {
            background: var(--primary); color: white; padding: 3rem 2rem; text-align: center;
        }
        .auth-header h2 { font-weight: 700; }
        .form-control, .input-group-text { border-radius: 12px; }
        .btn-primary {
            background: var(--primary); border: none; border-radius: 12px; padding: 14px;
            font-weight: 600; transition: all 0.3s;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Welcome Back!</h2>
                        <p class="mb-0 opacity-75">Log in to continue tracking your health</p>
                    </div>
                    <div class="card-body p-5">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for msg in messages %}
                                    <div class="alert alert-danger rounded-pill">{{ msg }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Username</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow">Login</button>
                        </form>

                        <p class="text-center mt-4 text-muted">
                            New here? <a href="/register" class="text-primary fw-bold">Create an account</a>
                        </p>
                        <p class="text-center mt-3"><a href="/" class="text-muted small">← Back to Home</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
